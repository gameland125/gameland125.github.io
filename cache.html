<!DOCTYPE html>
<html manifest="PSFree.manifest">
<head>
    <meta charset="UTF-8">
    <title>Gameland Cache Installer</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        #msgs { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="msgs">در حال آماده‌سازی حافظه آفلاین...</div>

    <script>
        // حذف دستکاری تاریخچه برای جلوگیری از تداخل
        var msgs = document.getElementById('msgs');

        function DLProgress(e) {
            var percent = Math.round(e.loaded / e.total * 100);
            msgs.innerHTML = "در حال نصب کش آفلاین: " + percent + "%";
        }

        function DisplayCacheProgress() {
            msgs.innerHTML = "کش با موفقیت نصب شد!";
            localStorage.setItem('offlineCacheInstalled', 'true');
            setTimeout(function() {
                location.href = "index.html"; // بازگشت به صفحه اصلی بعد از موفقیت
            }, 2000);
        }

        if (window.applicationCache) {
            window.applicationCache.addEventListener("progress", DLProgress, false);
            window.applicationCache.oncached = function(e) { DisplayCacheProgress(); };
            window.applicationCache.onupdateready = function(e) { DisplayCacheProgress(); };
            
            window.applicationCache.onerror = function(e) {
                msgs.innerHTML = "خطا در نصب کش! لطفا صفحه را رفرش کنید.";
                console.log("Cache Error");
            };
        } else {
            msgs.innerHTML = "مرورگر شما از کش پشتیبانی نمی‌کند.";
        }
    </script>
</body>
</html>
