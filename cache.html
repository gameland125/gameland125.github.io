<html manifest="PSFree.manifest">
<head>
<meta charset="utf-8">
<title>Cache Installer</title>
<style>
body {
    background-color: #333;
    color: white;
    font-family: sans-serif;
    text-align: center;
    padding-top: 100px;
}
#msgs {
    font-size: 24px;
    font-weight: bold;
}
</style>
</head>
<body>
<div id="msgs">Installing Offline Cache...</div>

<script>
history.replaceState(null, null, "index.html");

function DLProgress(e) {
    var percent = Math.round((e.loaded / e.total) * 100);
    document.getElementById("msgs").innerHTML = "Installing Offline Cache ... " + percent + "%";
}

function DisplayCacheProgress() {
    setTimeout(function () {
        document.getElementById("msgs").innerHTML = "Cache Installed Successfully";
    }, 2000);

    setTimeout(function () {
        sessionStorage.setItem("continueAfterInstall", "true");
        location.href = "index.html";
    }, 3000);
}

window.applicationCache.addEventListener("progress", DLProgress, false);
window.applicationCache.oncached = function (e) {
    DisplayCacheProgress();
};
window.applicationCache.onupdateready = function (e) {
    DisplayCacheProgress();
};
</script>
</body>
</html>
